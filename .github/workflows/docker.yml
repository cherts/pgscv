---
name: Docker

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set docker environment
        id: docker
        run: |
          echo DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}" >>$GITHUB_OUTPUT
          echo DOCKERHUB_TOKEN="${{ secrets.DOCKERHUB_TOKEN }}" >>$GITHUB_OUTPUT
      - name: Set environment
        id: version
        run: |
          LATEST_TAG=$(git describe --tags $(git rev-list --abbrev-commit --tags --max-count=1) --abbrev=0 2>/dev/null || echo "v$(git rev-parse --abbrev-ref HEAD | cut -d'/' -f2)")
          echo "CURRENT_VERSION=${LATEST_TAG}" >>$GITHUB_OUTPUT
          echo "Current version: ${LATEST_TAG#v}"
      - name: Lint Dockerfile
        run: make docker-lint
      - name: Set up QEMU (enables multi-arch emulation)
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to Docker Hub
        if: ${{ steps.docker.outputs.DOCKERHUB_USERNAME != '' && steps.docker.outputs.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v4
        with:
          username: ${{ steps.docker.outputs.DOCKERHUB_USERNAME }}
          password: ${{ steps.docker.outputs.DOCKERHUB_TOKEN }}
      - name: Build and push image
        if: ${{ steps.docker.outputs.DOCKERHUB_USERNAME != '' && steps.docker.outputs.DOCKERHUB_TOKEN != '' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.docker.outputs.DOCKERHUB_USERNAME }}/pgscv:latest
            ${{ steps.docker.outputs.DOCKERHUB_USERNAME }}/pgscv:${{ steps.version.outputs.CURRENT_VERSION }}
