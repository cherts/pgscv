---
name: Default

on:
  workflow_dispatch:
  push:
    paths:
      - "cmd/**"
      - "internal/**"
      - "discovery/**"
      - "Makefile"
      - "go.mod"
      - "go.sum"
  pull_request:
    paths:
      - "cmd/**"
      - "internal/**"
      - "discovery/**"
      - "Makefile"
      - "go.mod"
      - "go.sum"

env:
  UBUNTU_VER: "24.04"
  TEST_RUNNER_PG17_VER: "1.0.16"
  TEST_RUNNER_PG18_VER: "2.0.16"

jobs:
  test:
    runs-on: ubuntu-${{ env.UBUNTU_VER }}
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        include:
          - container: cherts/pgscv-test-runner:${{ env.TEST_RUNNER_PG17_VER }}
          - container: cherts/pgscv-test-runner:${{ env.TEST_RUNNER_PG18_VER }}
    container: ${{ matrix.container }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set Git config
        run: git config --global --add safe.directory /__w/pgscv/pgscv
      - name: Prepare test environment
        run: prepare-test-environment.sh
      - name: Check code modernization
        run: make modernize-check
      - name: Run tests
        run: make test
